---
exclude:
  (?x)^(
  __NONE__)$
repos:
  - repo: https://github.com/executablebooks/mdformat
    # Do this before other tools "fixing" the line endings
    rev: 0.7.22
    hooks:
      - id: mdformat
        name: Format Markdown
        entry: mdformat  # Executable to run, with fixed options
        language: python
        types: [markdown]
        args: [--wrap, '75', --number]
        additional_dependencies:
          - mdformat-toc
          - mdformat-gfm
          - mdformat-beautysh
          - setuptools

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # - id: no-commit-to-branch
      #  args: [--branch, main]
      - id: debug-statements
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: .*\.md$
      - id: check-json
      - id: mixed-line-ending
      - id: check-builtin-literals
        args: [--ignore=dict]
      - id: check-ast
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
        exclude: ^(test/.*)$
      - id: fix-byte-order-marker
      - id: check-case-conflict
  - repo: https://github.com/lovesegfault/beautysh.git
    rev: v6.2.1
    hooks:
      - id: beautysh
        additional_dependencies:
          - setuptools
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  #### JJK: Add hook to copy changes in README.md from root->haoskiosk and vice-versa
  - repo: local
    hooks:
      - id: copy-readme-root-to-haoskiosk
        name: "Copy README.md: root -> haoskiosk"
        entry: cp -a README.md haoskiosk
        language: system  # Allows system commands like `cp`
        types: [markdown]
        files: ^README\.md$  # Only trigger when README.md changes

  # Copy README.md: haoskiosk -> root
  - repo: local
    hooks:
      - id: copy-readme-haoskiosk-to-root
        name: "Copy README.md: haoskiosk -> root"
        entry: cp -a haoskiosk/README.md .
        language: system  # Allows system commands like `cp`
        types: [markdown]
        files: ^haoskiosk/README\.md$  # Only trigger when README.md changes

